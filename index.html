<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marko Davi - Streamer</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 15px;
            min-height: 100vh;
            background: linear-gradient(135deg, #2D1B69, #4A3B8C, #6A5ACD);
            font-family: 'Montserrat', sans-serif;
            color: #E6E6FA;
            overflow-x: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Elementos de fundo com movimento mais intenso */
        .bg-element {
            position: absolute;
            border-radius: 50%;
            opacity: 0.3;
            filter: blur(30px);
            z-index: 0;
            animation: float-aggressive 20s infinite ease-in-out;
        }
        
        .bg-element:nth-child(1) {
            width: 200px; height: 200px;
            background: #8A2BE2;
            top: -50px; left: -50px;
            animation-duration: 25s;
        }
        
        .bg-element:nth-child(2) {
            width: 150px; height: 150px;
            background: #9370DB;
            bottom: -30px; right: 30px;
            animation-duration: 30s;
            animation-delay: 3s;
        }
        
        .bg-element:nth-child(3) {
            width: 250px; height: 250px;
            background: #6A5ACD;
            top: 100px; right: -100px;
            animation-duration: 35s;
            animation-delay: 6s;
        }
        
        .bg-element:nth-child(4) {
            width: 180px; height: 180px;
            background: #7B68EE;
            bottom: 50px; left: 30px;
            animation-duration: 40s;
            animation-delay: 9s;
        }

        .banner-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            background: rgba(70, 50, 140, 0.35);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 0 0 40px rgba(138, 43, 226, 0.4);
            z-index: 20;
            border: 1px solid rgba(200, 180, 255, 0.2);
            animation: container-pulse 8s infinite alternate;
            padding: 20px;
        }

        .banner-content {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding-bottom: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(200, 180, 255, 0.3);
        }

        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid transparent;
            background: linear-gradient(45deg, #8A2BE2, #9370DB, #6A5ACD) border-box;
            margin-bottom: 15px;
            box-shadow: 0 0 25px rgba(130, 90, 210, 0.6);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 15;
            animation: aggressive-pulse 3s infinite ease-in-out;
        }

        .profile-image::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(45deg, #8A2BE2, #9370DB, #6A5ACD);
            opacity: 0.5;
            z-index: -1;
            animation: rotate 10s linear infinite;
        }

        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            transition: transform 0.5s ease;
        }

        .profile-image:hover img {
            transform: scale(1.08);
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(200, 180, 255, 0.7);
            letter-spacing: 1px;
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 5px;
            color: #E6E6FA;
            animation: aggressive-shimmer 4s infinite ease-in-out;
            text-align: center;
        }

        .profile-tag {
            font-size: 0.9rem;
            color: #C9B6F0;
            margin-bottom: 10px;
            font-weight: 500;
            background: rgba(90, 70, 150, 0.4);
            padding: 4px 12px;
            border-radius: 15px;
            animation: tag-bounce 6s infinite ease-in-out;
        }

        .info-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .banner-text {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            text-shadow: 0 0 20px rgba(200, 180, 255, 0.8);
            font-family: 'Orbitron', sans-serif;
            line-height: 1.2;
            color: #E6E6FA;
            animation: aggressive-shimmer 5s infinite ease-in-out;
            animation-delay: 1s;
            text-align: center;
        }

        .banner-subtext {
            font-size: 1rem;
            color: #C9B6F0;
            margin-bottom: 20px;
            line-height: 1.4;
            font-weight: 400;
            animation: fade-in-out 8s infinite alternate;
            text-align: center;
        }

        .highlight {
            color: #D8BFD8;
            font-weight: 600;
            animation: color-pop 4s infinite alternate;
            text-shadow: 0 0 10px rgba(216, 191, 216, 0.7);
        }

        .social-channels {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
            justify-content: center;
        }

        .channel {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            color: #C9B6F0;
            background: rgba(80, 60, 140, 0.5);
            padding: 6px 12px;
            border-radius: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(200, 180, 255, 0.3);
            text-decoration: none;
            animation: channel-float 8s infinite ease-in-out;
        }

        .channel:nth-child(1) { animation-delay: 0s; }
        .channel:nth-child(2) { animation-delay: 1s; }
        .channel:nth-child(3) { animation-delay: 2s; }
        .channel:nth-child(4) { animation-delay: 3s; }
        .channel:nth-child(5) { animation-delay: 4s; }

        .channel:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4), 0 0 15px rgba(200, 180, 255, 0.6);
            background: rgba(100, 80, 160, 0.7);
            color: #E6E6FA;
        }

        .channel-icon {
            width: 14px;
            height: 14px;
            margin-right: 6px;
            object-fit: contain;
        }

        /* Elementos flutuantes com movimento mais intenso */
        .floating-item {
            position: absolute;
            opacity: 0.7;
            animation: aggressive-float 15s infinite linear;
            z-index: 5;
            font-size: 1.5rem;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
        }
        
        .floating-item:nth-child(1) {
            top: 5%;
            left: 5%;
            animation-duration: 20s;
            animation-delay: 0s;
        }
        
        .floating-item:nth-child(2) {
            bottom: 10%;
            left: 8%;
            animation-duration: 25s;
            animation-delay: 2s;
        }
        
        .floating-item:nth-child(3) {
            top: 15%;
            right: 6%;
            animation-duration: 30s;
            animation-delay: 4s;
        }
        
        .floating-item:nth-child(4) {
            bottom: 8%;
            right: 10%;
            animation-duration: 35s;
            animation-delay: 6s;
        }

        /* Animações mais agressivas */
        @keyframes float-aggressive {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            25% { transform: translate(20px, -20px) scale(1.1) rotate(5deg); }
            50% { transform: translate(-20px, 20px) scale(1.2) rotate(-5deg); }
            75% { transform: translate(30px, 20px) scale(1.1) rotate(3deg); }
            100% { transform: translate(0, 0) scale(1) rotate(0deg); }
        }

        @keyframes aggressive-float {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            25% { transform: translate(30px, 20px) rotate(90deg) scale(1.3); }
            50% { transform: translate(15px, 40px) rotate(180deg) scale(1.1); }
            75% { transform: translate(-25px, 25px) rotate(270deg) scale(1.4); }
            100% { transform: translate(0, 0) rotate(360deg) scale(1); }
        }

        @keyframes aggressive-pulse {
            0% { transform: scale(1); box-shadow: 0 0 25px rgba(130, 90, 210, 0.6); }
            50% { transform: scale(1.08); box-shadow: 0 0 40px rgba(150, 110, 230, 0.9); }
            100% { transform: scale(1); box-shadow: 0 0 25px rgba(130, 90, 210, 0.6); }
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes aggressive-shimmer {
            0% { text-shadow: 0 0 15px rgba(200, 180, 255, 0.7); }
            50% { text-shadow: 0 0 25px rgba(230, 210, 255, 1), 0 0 35px rgba(200, 180, 255, 0.9); }
            100% { text-shadow: 0 0 15px rgba(200, 180, 255, 0.7); }
        }
        
        @keyframes color-pop {
            0% { color: #D8BFD8; text-shadow: 0 0 10px rgba(216, 191, 216, 0.7); }
            50% { color: #FFECFF; text-shadow: 0 0 20px rgba(255, 236, 255, 1); }
            100% { color: #D8BFD8; text-shadow: 0 0 10px rgba(216, 191, 216, 0.7); }
        }

        @keyframes container-pulse {
            0% { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 0 0 40px rgba(138, 43, 226, 0.4); }
            50% { box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4), 0 0 60px rgba(138, 43, 226, 0.7); }
            100% { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 0 0 40px rgba(138, 43, 226, 0.4); }
        }

        @keyframes tag-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes fade-in-out {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; }
        }

        @keyframes channel-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        /* Efeito de partículas mais intenso */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(200, 180, 255, 0.6);
            border-radius: 50%;
            animation: particle-aggressive 15s infinite linear;
        }

        @keyframes particle-aggressive {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
            10% { opacity: 0.8; }
            50% { transform: translateY(-50vh) translateX(50px) scale(1.5); opacity: 1; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-100vh) translateX(100px) scale(1); opacity: 0; }
        }

        /* Media queries para ajustes adicionais em telas muito pequenas */
        @media (max-width: 360px) {
            .banner-container {
                padding: 15px;
            }
            
            .profile-image {
                width: 100px;
                height: 100px;
            }
            
            .profile-name {
                font-size: 1.3rem;
            }
            
            .banner-text {
                font-size: 1.3rem;
            }
            
            .social-channels {
                gap: 6px;
            }
            
            .channel {
                font-size: 0.7rem;
                padding: 5px 10px;
            }
            
            .channel-icon {
                width: 12px;
                height: 12px;
            }
        }
    </style>
</head>

    <script>
        // Criar partículas mais intensas
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 25;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Tamanho aleatório (partículas maiores)
                const size = Math.random() * 5 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                
                // Posição inicial aleatória
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.bottom = `-10px`;
                
                // Duração e delay aleatórios (mais rápidos)
                const duration = Math.random() * 10 + 10;
                const delay = Math.random() * 3;
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `${delay}s`;
                
                // Cores variadas
                const colors = [
                    'rgba(200, 180, 255, 0.7)',
                    'rgba(170, 140, 240, 0.7)',
                    'rgba(150, 110, 230, 0.7)',
                    'rgba(230, 210, 255, 0.7)'
                ];
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                particlesContainer.appendChild(particle);
            }
        }
        
        // Iniciar quando a página carregar
        window.onload = function() {
            createParticles();
        };
    </script>
